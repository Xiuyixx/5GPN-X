name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: |
          shellcheck -x install.sh quick-install.sh lib/update-rules.sh lib/renew-hook.sh
          shellcheck -x tests/*.sh
      - name: Python compile + ruff
        run: |
          python3 -m py_compile lib/*.py
          pipx run ruff check lib/ tests/

  shell-python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shell test suite
        run: |
          for t in tests/*.sh; do
            echo "RUN $t"
            sudo -E bash "$t"
          done
      - name: Run python test suite
        run: |
          for t in tests/*.py; do
            echo "RUN $t"
            python3 "$t"
          done

  powershell-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run PowerShell policy tests
        run: |
          for t in tests/*.ps1; do
            echo "RUN $t"
            pwsh -NoProfile -File "$t"
          done

  go-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Test quic-proxy
        run: |
          set -euo pipefail
          for prog in quic-proxy; do
            dir="$(mktemp -d)"
            cp "lib/${prog}.go" "lib/${prog}_test.go" "$dir/"
            (cd "$dir" && go mod init "$prog" >/dev/null && go vet ./... && go test ./...)
          done
